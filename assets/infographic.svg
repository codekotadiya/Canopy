<!-- 3 step nodes on the ring -->
<!-- Node positions on ring (r=142):
     10 o'clock (SVG 210°): x=600+142*cos(210°)=600-122.9=477, y=285+142*sin(210°)=285-71=214
     6 o'clock  (SVG 90°):  x=600, y=285+142=427   ← too low
     Let me use: top (270°), lower-left (210°), lower-right (330°)
     270°: x=600, y=285-142=143  ← too close to header
     Let me use 3 nodes around the bottom half:
     210° (lower-left):  x=600+142*cos(210°)=477, y=285+142*sin(210°)=356
       cos(210°)=-0.866, sin(210°)=-0.5 → x=477, y=214  ← that's UPPER left
       Wait, cos(210°) = cos(180°+30°) = -cos30 = -0.866
             sin(210°) = sin(180°+30°) = -sin30 = -0.5
       So y = 285 + 142*(-0.5) = 285-71 = 214 ← upper area

     Let me use clock positions for visual impact:
     - 11 o'clock: SVG angle = (11h * 30° - 90°) = 330° - 90° = 240°
       Wait. Clock 12 = top = SVG 270°. Each hour = 30°.
       Clock 11 = 270° + 30° = 300° (going CCW from top in clock = going CCW in SVG)
       Actually SVG angles go CW. Clock also goes CW. Clock 12 = SVG 270°.
       Clock N = SVG (270° + N*30°) % 360°... no.

       Clock: 12=top, 3=right, 6=bottom, 9=left. Going CW.
       SVG: 0=right, 90=bottom, 180=left, 270=top. Going CW.

       Clock 12 = top = SVG 270°.
       Clock 3  = right = SVG 0°.
       Clock 6  = bottom = SVG 90°.
       Clock 9  = left = SVG 180°.

       Difference: SVG = Clock - 90° (mod 360°)...
       No: Clock 12 = 0° in clock. SVG equivalent = 270°. So SVG = Clock_degrees - 90° doesn't work for clock 12.

       Let me just define: SVG_angle = (Clock_angle - 90°) mod 360° where Clock_angle = (hour * 30°)
       Clock 12 = 0° → SVG = (0-90) mod 360 = 270° ✓
       Clock 3 = 90° → SVG = (90-90) = 0° ✓
       Clock 6 = 180° → SVG = 90° ✓
       Clock 9 = 270° → SVG = 180° ✓

       So Clock 11 = 330° → SVG = 240°
       cos(240°) = -0.5, sin(240°) = -0.866
       x = 600 + 142*(-0.5) = 529, y = 285 + 142*(-0.866) = 162 ← upper-left

       Clock 1 = 30° → SVG = -60° = 300°
       cos(300°) = 0.5, sin(300°) = -0.866
       x = 600 + 142*0.5 = 671, y = 285 + 142*(-0.866) = 162 ← upper-right

       These are too close to y=162 which is in the circle upper area but the header is at y=96.
       Circle top = 285-142 = 143, so y=162 is 19px inside from the top of the circle.
       That's fine for nodes on the ring.

       But wait - I want the step labels to be OUTSIDE the circle. For nodes at y=162,
       labels would be at y≈140, which overlaps with the header area (separator at y=96).

       Let me put them at the bottom of the circle instead:
       Clock 5 = 150° → SVG = 60°: x=600+142*cos(60°)=600+71=671, y=285+142*sin(60°)=285+123=408
       Clock 7 = 210° → SVG = 120°: x=600+142*cos(120°)=600-71=529, y=285+142*sin(120°)=285+123=408
       Clock 6 = 180° → SVG = 90°: x=600, y=285+142=427

       These are at y=408 and y=427, below the circle bottom.
       With step pills at y~435, I have:
       Circle bottom: 285+142=427. Outer ring bottom: 285+155=440.

       Nodes at clock 5 (671, 408), clock 6 (600, 427), clock 7 (529, 408) - these are ON the ring.
       Labels below each at y≈425-445.

       But y=427 overlaps with the outer ring edge at y=440. Too cramped.

       Better: 3 node dots at bottom of ring, with small label pills just below them.
       Nodes: clock 4,6,8 type positions.

       Actually let me just skip the ring nodes and do the 3 step pills in a clean row below the circle.
       Circle bottom: 285+142=427.
       Step pills at y=443 (gap of 16px from ring edge).
       Bottom stats bar at y=518.
       Gap: 518-473=45px. Might be tight but workable.
-->

